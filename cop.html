<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="cop.css">
</head>
<body>
   <div class="container">
    <h3>Tic Tac Toe</h3>
    <div class="game">
    <div class="box" data-cell="0"></div>
    <div class="box" data-cell="1"></div>
    <div class="box" data-cell="2"></div>
    <div class="box" data-cell="3"></div>
    <div class="box" data-cell="4"></div>
    <div class="box" data-cell="5"></div>
    <div class="box" data-cell="6"></div>
    <div class="box" data-cell="7"></div>
    <div class="box" data-cell="8"></div>
   </div>
   <button class="reset" type="button">Reset</button></div>
   <p id="ans" aria-live="polite">Current turn: X</p>
    <script src="cop.js" defer></script>
</body>
</html>
